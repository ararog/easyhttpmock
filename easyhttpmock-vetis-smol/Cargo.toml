[package]
name = "easyhttpmock-vetis-smol"
version = "0.1.0-beta.1"
edition = "2021"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
repository = "https://github.com/ararog/easyhttpmock"
homepage = "https://github.com/ararog/easyhttpmock"
description = "EasyHttpMock adapter for Vetis HTTP server using smol runtime."
readme = "README.md"
license = "MIT OR Apache-2.0"
keywords = ["http", "mock", "testing"]
publish = true
rust-version = "1.75.0"

[package.metadata.docs.rs]
all-features = true

[features]
http1 = ["vetis-smol/http1"]
http2 = ["vetis-smol/http2"]
http3 = ["vetis-smol/http3"]

rust-tls = ["vetis-smol/rust-tls"]

[dependencies]
easyhttpmock = { path = "../easyhttpmock" }
http = "1.4.0"
rand = "0.9.2"
vetis-smol = { path = "../../vetis/vetis-smol" }
